<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Hidrografia e Nascentes</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Segoe UI", Arial, sans-serif; }
  html, body { height: 100%; }
  #mapa { width: 100%; height: 100vh; }

  .topo {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: #1a3550;
    color: #fff;
    padding: 12px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }

  .topo h1 {
    font-size: 1.05rem;
    font-weight: 600;
  }

  .topo h1 span { color: #6fc3b3; }

  .legenda {
    position: absolute;
    bottom: 24px;
    right: 12px;
    z-index: 1000;
    background: #fff;
    padding: 14px 16px;
    border-radius: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    font-size: 0.85rem;
    line-height: 1.6;
    max-width: 220px;
  }

  .legenda h3 {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #1a3550;
    margin-bottom: 8px;
  }

  .legenda .item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  .legenda .linha {
    width: 22px;
    height: 0;
    border-top: 3px solid;
    display: inline-block;
  }

  .legenda .ponto {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    display: inline-block;
    border: 2px solid #fff;
  }

  .leaflet-popup-content b { color: #1a3550; }
</style>
</head>
<body>

<div class="topo">
  <h1>Mapa de Hidrografia<span> &amp; Nascentes</span></h1>
</div>

<div id="mapa"></div>

<div class="legenda">
  <h3>Legenda</h3>
  <div class="item"><span class="linha" style="border-color:#1f6fb2;"></span> Perene</div>
  <div class="item"><span class="linha" style="border-color:#52a8d8;"></span> Intermitente</div>
  <div class="item"><span class="linha" style="border-color:#9bcbe8; border-top-style: dashed;"></span> Efêmero</div>
  <div class="item"><span class="ponto" style="background:#2f7a6e;"></span> Nascente</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
async function iniciar() {
  const mapa = L.map('mapa');

  const satelite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    maxZoom: 20,
    attribution: 'Tiles &copy; Esri'
  });

  const ruas = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 20,
    attribution: '&copy; OpenStreetMap contributors'
  });

  satelite.addTo(mapa);

  const corPorClasse = {
    "Perene": "#1f6fb2",
    "Intermitente": "#52a8d8",
    "Efemero": "#9bcbe8"
  };

  const [hidroResp, nascResp] = await Promise.all([
    fetch('hidrografia.geojson'),
    fetch('nascentes.geojson')
  ]);
  const hidro = await hidroResp.json();
  const nasc = await nascResp.json();

  const camadaHidro = L.geoJSON(hidro, {
    style: (feature) => {
      const classe = feature.properties.CLASSE;
      return {
        color: corPorClasse[classe] || "#1f6fb2",
        weight: 3,
        dashArray: classe === "Efemero" ? "6 4" : null
      };
    },
    onEachFeature: (feature, layer) => {
      const classe = feature.properties.CLASSE || "Não informado";
      layer.bindPopup(`<b>Curso d'água</b><br>Classe: ${classe}`);
    }
  }).addTo(mapa);

  const camadaNascentes = L.geoJSON(nasc, {
    pointToLayer: (feature, latlng) => L.circleMarker(latlng, {
      radius: 7,
      fillColor: "#2f7a6e",
      color: "#fff",
      weight: 2,
      fillOpacity: 0.9
    }),
    onEachFeature: (feature, layer) => {
      const id = feature.properties.Id ?? "-";
      layer.bindPopup(`<b>Nascente</b><br>Id: ${id}`);
    }
  }).addTo(mapa);
